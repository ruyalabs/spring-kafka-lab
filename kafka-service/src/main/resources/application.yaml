# src/main/resources/application.yaml

# ... other configurations

# Kafka scheduler configuration
kafka:
  scheduler:
    listener-ids:
      - paymentRequestListener
      # - another-consumer-listener-id  # Add new listener IDs here

# Common configuration for all profiles
spring:
  profiles:
    active: dev  # Default profile is dev

# Kafka configuration common for all profiles
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      properties:
        delivery.timeout.ms: 10000  # in milliseconds
        request.timeout.ms: 5000  # in milliseconds
        max.block.ms: 5000  # in milliseconds
        max.in.flight.requests.per.connection: 1
        enable.idempotence: true
        retry.backoff.ms: 1000  # in milliseconds
    consumer:
      auto-offset-reset: earliest # Process from the beginning if no offset is found
      enable-auto-commit: false   # Disable auto-commit for manual control
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer # Use JsonDeserializer for PaymentDto
      concurrency: 3              # Number of consumer threads
      properties:
        spring.json.trusted.packages: ch.ruyalabs.springkafkalab.dto # Trust package for JsonDeserializer
    listener:
      ack-mode: MANUAL_IMMEDIATE # Acknowledge messages manually right after processing
      retry:
        initial-interval: 1s    # Initial backoff interval
        multiplier: 2.0         # Backoff multiplier
        max-interval: 60s       # Maximum backoff interval
        max-attempts: 0         # 0 means retry indefinitely

# Topic configuration common for all profiles
payment:
  request:
    topic: payment-request

---
# Development profile configuration
spring:
  config:
    activate:
      on-profile: dev
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: payment-request-consumer-group-dev

# Service URLs for development environment
services:
  account-balance:
    url: http://localhost:8081
  booking:
    url: http://localhost:8082

---
# Test profile configuration
spring:
  config:
    activate:
      on-profile: test
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    consumer:
      group-id: payment-request-consumer-group-test

# Test-specific topic configuration
payment:
  request:
    topic: payment-request-test

# Service URLs for test environment
services:
  account-balance:
    url: http://localhost:8081
  booking:
    url: http://localhost:8082

---
# Production profile configuration
spring:
  config:
    activate:
      on-profile: prod
  kafka:
    bootstrap-servers: kafka-broker:9092
    consumer:
      group-id: payment-request-consumer-group-prod

# Service URLs for production environment
services:
  account-balance:
    url: http://account-balance-service:8081
  booking:
    url: http://booking-service:8082
